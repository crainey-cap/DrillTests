<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['DM Sans', 'sans-serif'] }, colors: { 'cap-blue': '#001489' } } }
        }
    </script>
    <style>body { font-family: 'DM Sans', sans-serif; }</style>
    <script>
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "mailto:rainey.c@natcapwg.cap.gov";
            }, 1500);
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">
    <div class="bg-cap-blue px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="logo.h50-c1.png" alt="Logo" class="h-10 w-auto">
        </div>
        <span class="text-blue-200 text-xs font-medium tracking-wide uppercase hidden sm:block">Arlington Composite Squadron</span>
    </div>

    <main class="flex-1 flex items-center justify-center px-4">
        <div class="bg-white rounded-xl border border-slate-200 p-8 max-w-md w-full text-center">
            <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 mb-2">Opening Email Client</h1>
            <p class="text-sm text-slate-500 mb-4">Redirecting you to your email client&hellip;</p>
            <p class="text-sm text-slate-600">
                If you are not redirected automatically,
                <a href="mailto:rainey.c@natcapwg.cap.gov" class="text-blue-600 font-semibold hover:underline">click here to send an email.</a>
            </p>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-200 bg-white px-4 py-4 text-center">
        <a href="https://NATCAPWG.CAP.GOV" class="text-sm font-semibold text-cap-blue hover:underline">
            Arlington Composite Squadron
        </a>
        <p class="text-xs text-slate-400 mt-1">
            Made by 2d Lt Carter Rainey &nbsp;·&nbsp; © 2026 Civil Air Patrol, All Rights Reserved
        </p>
    </footer>
</body>
</html>
